<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ELIJAH | Courses</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --cream: #F5F0E8;
    --dark: #1A1208;
    --gold: #C8952A;
    --gold-light: #E8C068;
    --brown: #5C3D1E;
    --text: #2E2010;
    --muted: #8A7560;
  }

  body {
    background: var(--dark);
    color: var(--cream);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; justify-content: space-between; align-items: center;
    padding: 1.2rem 3rem;
    background: rgba(26,18,8,0.85);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(200,149,42,0.2);
  }
  .nav-logo {
    font-family: 'Times New Roman', Times, serif;
    font-weight: 900; font-size: 2.1rem;
    color: var(--gold); letter-spacing: 0.05em;
  }
  .nav-links { display: flex; gap: 2rem; }
  .nav-links a {
    font-size: 2.85rem; font-weight: 500; letter-spacing: 0.08em;
    text-transform: uppercase; text-decoration: none;
    color: rgba(245,240,232,0.5); transition: color 0.2s;
  }
  .nav-links a:hover, .nav-links a.active { color: var(--gold); }

  .page-header {
    padding: 9rem 3rem 4rem;
    position: relative; overflow: hidden;
  }
  .page-header::before {
    content: '2025';
    position: absolute; right: -1rem; top: 4rem;
    font-family: 'Playfair Display', serif;
    font-size: 14rem; font-weight: 900;
    color: rgba(200,149,42,0.06);
    line-height: 1; pointer-events: none;
    white-space: nowrap;
  }
  .eyebrow {
    font-size: 2.75rem; font-weight: 500; letter-spacing: 0.2em;
    text-transform: uppercase; color: var(--gold);
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 1rem;
    opacity: 0; animation: fadeUp 0.6s ease 0.2s forwards;
  }
  .eyebrow::before { content: ''; display: block; width: 32px; height: 1px; background: var(--gold); }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(5.5rem, 7vw, 7.5rem);
    font-weight: 900; line-height: 1.1;
    color: var(--cream);
    opacity: 0; animation: fadeUp 0.6s ease 0.4s forwards;
  }
  h1 em { color: var(--gold); font-style: italic; }

  .header-sub {
    margin-top: 1rem; font-size: 2.2rem; color: rgba(245,240,232,0.5);
    opacity: 0; animation: fadeUp 0.6s ease 0.6s forwards;
  }

  .courses-section { padding: 2rem 3rem 6rem; }

  .courses-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 1.5rem;
  }

  .course-card {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(200,149,42,0.15);
    border-radius: 8px;
    padding: 2rem;
    position: relative; overflow: hidden;
    transition: transform 0.25s ease, border-color 0.25s ease, background 0.25s ease;
    opacity: 0; animation: fadeUp 0.5s ease forwards;
  }

  .course-card:hover {
    transform: translateY(-6px);
    border-color: var(--gold);
    background: rgba(200,149,42,0.06);
  }

  .course-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, var(--gold), var(--gold-light));
    transform: scaleX(0); transform-origin: left;
    transition: transform 0.3s ease;
  }
  .course-card:hover::before { transform: scaleX(1); }

  .card-number {
    font-family: 'Times New Roman', Times, serif;
    font-size: 4.5rem; font-weight: 900;
    color: rgba(200,149,42,0.12);
    line-height: 1; margin-bottom: 1rem;
  }

  .course-name {
    font-family: 'Times New Roman', Times, serif;
    font-size: 2.6rem; font-weight: 700;
    color: var(--cream); margin-bottom: 0.5rem;
    line-height: 1.3;
  }

  .card-footer {
    margin-top: 1.5rem; padding-top: 1rem;
    border-top: 1px solid rgba(200,149,42,0.1);
    display: flex; justify-content: space-between; align-items: center;
  }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #4ade80;
    box-shadow: 0 0 8px rgba(74,222,128,0.5);
  }

  .total-bar {
    margin-top: 3rem;
    padding: 2.5rem 2rem;
    background: rgba(200,149,42,0.08);
    border: 1px solid rgba(200,149,42,0.2);
    border-radius: 8px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .total-bar strong {
    font-family: 'Playfair Display', serif;
    font-size: 2.8rem; color: var(--gold);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 700px) {
    nav { padding: 1rem 1.5rem; }
    .page-header, .courses-section { padding-left: 1.5rem; padding-right: 1.5rem; }
  }
</style>
</head>
<body>

<nav>
  <div class="nav-logo">StudentID</div>
  <div class="nav-links">
    <a href="index.html">Profile</a>
    <a href="courses.html" class="active">Courses</a>
  </div>
</nav>

<div class="page-header">
  <div class="eyebrow">Academic Record</div>
  <h1>My Courses<br><em>This Semester</em></h1>
  <p class="header-sub">2025 / 2026 Academic Session &nbsp;·&nbsp; 200 Level</p>
</div>

<section class="courses-section">
  <div class="courses-grid">
    <div class="course-card"><div class="card-number">01</div><div class="course-name">Physics</div><div class="card-footer"><div class="status-dot"></div></div></div>
    <div class="course-card"><div class="card-number">02</div><div class="course-name">Calculus</div><div class="card-footer"><div class="status-dot"></div></div></div>
    <div class="course-card"><div class="card-number">03</div><div class="course-name">GST</div><div class="card-footer"><div class="status-dot"></div></div></div>
    <div class="course-card"><div class="card-number">04</div><div class="course-name">Python</div><div class="card-footer"><div class="status-dot"></div></div></div>
    <div class="course-card"><div class="card-number">05</div><div class="course-name">Web Development</div><div class="card-footer"><div class="status-dot"></div></div></div>
    <div class="course-card"><div class="card-number">06</div><div class="course-name">Cyber Security</div><div class="card-footer"><div class="status-dot"></div></div></div>
    <div class="course-card"><div class="card-number">07</div><div class="course-name">Physics Lab</div><div class="card-footer"><div class="status-dot"></div></div></div>
    <div class="course-card"><div class="card-number">08</div><div class="course-name">Data Structures and Algorithms</div><div class="card-footer"><div class="status-dot"></div></div></div>
  </div>

  <div class="total-bar">
    <p>Total registered courses this semester</p>
    <div><strong>8 Courses</strong></div>
  </div>
</section>

</body>
</html>
